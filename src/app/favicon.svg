<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#000000"/>
  <!-- QR finder pattern top-left -->
  <rect x="4"  y="4"  width="10" height="10" rx="1.5" fill="white"/>
  <rect x="6"  y="6"  width="6"  height="6"  rx="0.5" fill="#000000"/>
  <rect x="7.5" y="7.5" width="3" height="3" rx="0.25" fill="white"/>
  <!-- QR finder pattern top-right -->
  <rect x="18" y="4"  width="10" height="10" rx="1.5" fill="white"/>
  <rect x="20" y="6"  width="6"  height="6"  rx="0.5" fill="#000000"/>
  <rect x="21.5" y="7.5" width="3" height="3" rx="0.25" fill="white"/>
  <!-- QR finder pattern bottom-left -->
  <rect x="4"  y="18" width="10" height="10" rx="1.5" fill="white"/>
  <rect x="6"  y="20" width="6"  height="6"  rx="0.5" fill="#000000"/>
  <rect x="7.5" y="21.5" width="3" height="3" rx="0.25" fill="white"/>
  <!-- QR data dots (bottom-right area) -->
  <rect x="19" y="19" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="24" y="19" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="19" y="24" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="22" y="22" width="3" height="3" rx="0.5" fill="white"/>
  <rect x="25" y="24" width="3" height="3" rx="0.5" fill="white"/>
</svg>
